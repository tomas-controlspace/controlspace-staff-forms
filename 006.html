<!DOCTYPE html>
<html lang="pt-PT">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Novo Lead — Montijo · Control Space</title>
<style>
  @font-face {
    font-family: "Ctrl Space";
    src: url("https://www.controlspacestorage.com/ficheiros/estaticos/publico/fonts/ctrlspace-regular.woff2") format("woff2");
    font-weight: 400;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: "Ctrl Space";
    src: url("https://www.controlspacestorage.com/ficheiros/estaticos/publico/fonts/ctrlspace-fett.woff2") format("woff2");
    font-weight: 700;
    font-style: normal;
    font-display: swap;
  }

  *, *::before, *::after {
    box-sizing: border-box;
  }

  html, body {
    margin: 0;
    padding: 0;
  }

  body {
    font-family: "Ctrl Space", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    font-weight: 400;
    background: #ffffff;
    color: #0a0a0a;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    line-height: 1.5;
  }

  .page {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 32px 20px 48px;
  }

  .wrapper {
    width: 100%;
    max-width: 1120px;
    margin: 0 auto;
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  .header {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 16px;
    margin-bottom: 32px;
  }

  .header-spacer {
  }

  .brand {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .brand img {
    width: 150px;
    height: auto;
    display: block;
  }

  .staff-label {
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #52525b;
  }

  .location-badge {
    justify-self: end;
    display: inline-flex;
    align-items: center;
    background: #ffffff;
    border: 1px solid #e4e4e7;
    border-radius: 6px;
    padding: 6px 28px 6px 12px;
    font-size: 12px;
    color: #0a0a0a;
    white-space: nowrap;
    font-family: inherit;
    line-height: 1.5;
    appearance: none;
    -webkit-appearance: none;
    -moz-appearance: none;
    cursor: pointer;
    background-image: url("data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%2352525b' stroke-width='1.5' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
    background-repeat: no-repeat;
    background-position: right 10px center;
  }

  .location-badge:hover {
    border-color: #a1a1aa;
  }

  .location-badge:focus {
    outline: none;
    border-color: #0a0a0a;
    box-shadow: 0 0 0 3px rgba(10, 10, 10, 0.08);
  }

  .card {
    background: #ffffff;
    border: 1px solid #e4e4e7;
    border-radius: 10px;
    padding: 32px 32px 16px;
    box-shadow: 0 1px 2px rgba(0, 0, 0, 0.02);
  }

  .card h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.015em;
    margin: 0 0 6px;
    color: #0a0a0a;
  }

  .card .subtitle {
    color: #52525b;
    font-size: 14px;
    margin: 0 0 24px;
    line-height: 1.55;
  }

  #rapidstor-app {
    min-height: 400px;
  }

  #rapidstor-app div.facility-staff-self-service-nav,
  #rapidstor-app div.facility-self-service-nav {
    display: none;
  }

  .rapidstor-loading {
    display: flex;
    align-items: center;
    gap: 10px;
    color: #52525b;
    font-size: 14px;
    padding: 16px 0;
  }

  .rapidstor-dot {
    width: 6px;
    height: 6px;
    background: #52525b;
    border-radius: 50%;
    animation: pulse 1.2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 1; }
  }

  .footer {
    text-align: center;
    margin-top: 32px;
    color: #52525b;
    font-size: 12px;
  }

  @media (max-width: 640px) {
    .page {
      padding: 24px 16px 40px;
    }

    .header {
      grid-template-columns: 1fr;
      justify-items: center;
      gap: 20px;
      margin-bottom: 24px;
    }

    .header-spacer {
      display: none;
    }

    .location-badge {
      justify-self: center;
    }

    .wrapper {
      max-width: 100%;
    }

    .card {
      padding: 20px;
    }

    .card h1 {
      font-size: 20px;
    }
  }
</style>
</head>
<body>
  <div class="page">
    <div class="wrapper">
      <header class="header">
        <div class="header-spacer"></div>
        <div class="brand">
          <img src="https://www.controlspacestorage.com/ficheiros/estaticos/publico/multimedia/imagem/logo-control-space.svg" alt="Control Space Storage">
          <span class="staff-label">Staff Portal</span>
        </div>
        <select class="location-badge" aria-label="Seleccionar instalação">
          <option value="001.html">Campo de Ourique</option>
          <option value="002.html">Alcântara</option>
          <option value="003.html">NorteShopping</option>
          <option value="004.html">Alfragide</option>
          <option value="005.html">Porto Centro</option>
          <option value="006.html">Montijo</option>
          <option value="007.html">Sintra Cascais</option>
          <option value="008.html">GaiaShopping</option>
        </select>
      </header>

      <main class="card">
        <h1>Registar novo lead</h1>
        <p class="subtitle">Walk-in, chamada recebida, ou qualquer contacto que não deva ser seguido automaticamente pela Maria (AI).</p>

        <!-- RAPIDSTOR START -->
        <div id="rapidstor-app">
          <div class="rapidstor-loading">
            <span class="rapidstor-dot"></span>
            <span>A carregar formulário…</span>
          </div>
          <!--[if lte IE 9]><div id="rapidstor-ie" style="padding:20px 0;font-size:36px;font-weight:350;color:rgb(70, 71, 76);font-family:sans-serif;text-align:center">Sorry, we were unable to get the deals due to an error. Your browser version is not supported, please upgrade to the latest version.</div><![endif]-->
          <script type="text/javascript">(function () { var o = { mode: 'facility-staff-self-service', token: { corp: 'f97378856149be9c780d75f023902e8ecc5a07a0fdff68b9a794f721cdf2ace5ad2f0e1efc501e61bf517b79f70bf858', site: '847aee9020a3c1f3fc4b30cb885e05b3a4e255881c0feb1539341e265a7936fb9d161e5067ccc6b40c072a1c0408f16d' }, url: 'https://prod.rapidstorapp.com', parent_element_id: 'rapidstor-app', script_path: '/public/application/scripts/publicPanel/bootstrapper/bootstrapper.js', ignore_template: false, standalone: false }; var t = document.getElementById(o.parent_element_id); var s = document.createElement("script"); var e = Math.round((new Date()).getTime() / 1000); window.rapidstor_options = o; s.src = o.url + o.script_path + "?epoch=" + e; console.log("rsbsl: loading '" + s.src + "'..."); s.type = 'text/javascript'; s.async = true; s.onload = function () { console.log("rsbsl: loaded '" + s.src + "'."); }; t.appendChild(s); })();</script>
          <script>
            (function () {
              var host = document.getElementById('rapidstor-app');
              var loader = host.querySelector('.rapidstor-loading');
              if (!host || !loader) return;
              var mo = new MutationObserver(function () {
                if (host.querySelector(':scope > :not(.rapidstor-loading):not(script):not(#rapidstor-ie)')) {
                  loader.remove();
                  mo.disconnect();
                }
              });
              mo.observe(host, { childList: true, subtree: true });
            })();
          </script>
        </div>
        <!-- RAPIDSTOR END -->
      </main>

      <footer class="footer">
        Página interna · Control Space Storage · <span id="year"></span>
      </footer>
    </div>
  </div>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    (function () {
      var sel = document.querySelector('.location-badge');
      if (!sel || !sel.options) return;
      var current = location.pathname.split('/').pop();
      for (var i = 0; i < sel.options.length; i++) {
        if (sel.options[i].value === current) { sel.selectedIndex = i; break; }
      }
      sel.addEventListener('change', function () {
        if (this.value && this.value !== current) location.href = this.value;
      });
    })();
  </script>
</body>
</html>
